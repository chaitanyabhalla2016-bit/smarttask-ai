<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartTask AI</title>
    <link rel="shortcut icon" href="./images/smarttasks_ai_favicon.png" type="image/x-icon">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div id="liveAlertPlaceholder" class="opacity-0 mt-1 p-2 w-50 top-0 custom-start-25 position-fixed d-flex justify-content-center align-items-center">
        
    </div>
    
    <div class="container mt-5">
        <h1 class="text-center mb-4">
            SmartTask AI
        </h1>
        <div class="mb-4">
            <input type="text" id="task-input" class="form-control mb-2" placeholder="Enter task">
            <button id="add-task-btn" class="btn btn-primary">
                Add Task
            </button>
        </div>
        <div class="mb-3 d-flex align-items-center gap-2">
            <button class="btn btn-dark filter-btn active-filter" data-filter="all" id="all-tasks-filter">
                All
            </button>
            <button class="btn btn-success filter-btn" data-filter="completed" id="completed-tasks-filter">
                Completed
            </button>
            <button class="btn btn-warning filter-btn" data-filter="pending" id="pending-tasks-filter">
                Pending
            </button>
        </div>
        <div id="task-container">
        </div>
    </div>
    <!-- Custom JavaScript -->
    <script type="module" src="./js/app.js"></script>
</body>
</html>
